apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-bootstrap
  namespace: argocd
spec:
  generators:
    - list:
        elements:
{{- range .Values.apps }}
          - name: {{ .name }}
            namespace: {{ .namespace }}
            repoURL: {{ .repoURL }}
            chart: {{ .chart }}
            version: {{ .version }}
            values: |
{{ .values | indent 14 }}
{{- end }}

  template:
    metadata:
      name: '{{ "{{name}}" }}'
    spec:
      project: default

      source:
        repoURL: '{{ "{{repoURL}}" }}'
        chart: '{{ "{{chart}}" }}'
        targetRevision: '{{ "{{version}}" }}'
        helm:
          values: '{{ "{{values}}" }}'

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ "{{namespace}}" }}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - Replace=true
